{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ config.title }}{% endblock title %}

{% block sidebar %}{% endblock sidebar %}

{% block content %}
<div class="post-page">
  <a class="back-btn" href="{{ config.base_url }}">&lsaquo;</a>
  <article class="post-article">
    <h1 class="post-article-title">{{ page.title }}</h1>
    {{ page.content | safe }}
  </article>
</div>
{% endblock content %}
